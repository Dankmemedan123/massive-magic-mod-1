name: Build Mod
on:
  push:
    branches: ["**"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'
      - run: gradle build
      - uses: actions/upload-artifact@v4
        with:
          name: arcana-mod
          path: build/libs/*.jar
